<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דקה - מרחב מעבר אינטראקטיבי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dirt-ground: #2d2620;
            --wall-color: #57534e;
            --sky-top: #1a1817;
            --sky-bottom: #2d2a27;
            --flashlight-x: 50%;
            --flashlight-y: 50%;
            --roof-color: #9c9991;
            --roof-shadow: #5c5952;
        }
        body { 
            background-color: #0d0d0c; 
            overflow: hidden; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            cursor: crosshair;
            user-select: none;
        }
        .scene { 
            display:flex
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 60%, var(--dirt-ground) 100%); 
            perspective: 1200px;
            transition: background 2s ease, filter 1.5s ease;
        }
        
        .concrete-wall-bg {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/concrete-wall.png');
            opacity: 0.35;
            pointer-events: none;
            z-index: 1;
        }

        .wall-crack {
            position: absolute;
            stroke: rgba(0, 0, 0, 0.4);
            stroke-width: 1.5;
            fill: none;
            pointer-events: none;
            z-index: 2;
        }

        .scene.night-mode::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle 180px at var(--flashlight-x) var(--flashlight-y), transparent 100%, rgba(5, 5, 8, 0.98) 100%);
            z-index: 90;
            mix-blend-mode: multiply;
        }
        .scene.night-mode::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle 220px at var(--flashlight-x) var(--flashlight-y), rgba(255, 220, 160, 0.18) 0%, transparent 100%);
            z-index: 89;
            mix-blend-mode: screen;
        }

        /* Scene 3 (roof) has a different flashlight tint */
        .scene.night-mode.roof-scene::before {
            background: radial-gradient(circle 240px at var(--flashlight-x) var(--flashlight-y), rgba(180, 255, 220, 0.15) 0%, transparent 100%);
        }

        .rain-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 40;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .rain-container.active {
            opacity: 1;
        }
        .drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(156, 163, 175, 0.6));
            width: 1.5px;
            height: 50px;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(110vh); }
        }

        .interactive { cursor: pointer; transition: transform 0.3s ease, filter 0.3s ease; }
        .interactive:hover { filter: contrast(1.15) brightness(1.2); }

        .wet-laundry {
            filter: brightness(0.8) saturate(0.5) contrast(2) !important;
            transform: translateY(30px) scale(0.95);
        }

        #tooltip {
            position: fixed; background: rgba(18, 17, 16, 0.95); color: #fff;
            padding: 12px 18px; border-radius: 6px; pointer-events: none;
            display: none; z-index: 100; font-size: 13px; border-right: 4px solid #ef4444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            line-height: 1.6; max-width: 280px;
        }

        .loader {
            position: fixed; inset: 0; background: #0a0a0a; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(22, 21, 20, 0.9);
            backdrop-filter: blur(15px);
            padding: 20px;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.4);
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }

        .time-btn.active {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }
        
        .toggle-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }

        @keyframes gentle-sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        @keyframes shiver {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.005) translateY(0.5px); }
        }
        @keyframes subtle-shake {
            0%, 100% { transform: rotate(0deg) translateY(0); }
            50% { transform: rotate(0.4deg) translateY(-1px); }
        }
        @keyframes cables-sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        @keyframes micro-vibration {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-0.8px) skewX(0.1deg); }
        }
        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(50px); }
        }

        .sway-anim { animation: gentle-sway 6s ease-in-out infinite; transform-origin: top center; }
        .shiver-anim { animation: shiver 10s ease-in-out infinite; }
        .door-anim { animation: subtle-shake 8s ease-in-out infinite; transform-origin: bottom center; }
        .cables-anim { animation: cables-sway 6s ease-in-out infinite; transform-origin: top center; }
        .grate-anim { animation: micro-vibration 10s ease-in-out infinite; }
        .distant-anim { animation: subtle-shake 12s ease-in-out infinite; transform-origin: bottom center; }

        .drip-effect {
            position: absolute;
            background: rgba(156, 163, 175, 0.8);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: dripFall 1.5s infinite linear;
        }
        @keyframes dripFall {
            0% { transform: translateY(0); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(400px); opacity: 0; }
        }

        .visualizer-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 20px;
            width: 100%;
            margin-top: 8px;
        }
        .vis-bar {
            flex: 1;
            height: 2px;
            background: #ef4444;
            transition: height 0.15s ease;
        }

        /* Scene 3 roof */
        .corrugated-roof {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 38vh;
            background: repeating-linear-gradient(
                90deg,
                var(--roof-color),
                var(--roof-color) 30px,
                var(--roof-shadow) 32px,
                #333 35px,
                var(--roof-color) 40px
            );
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.5), 0 -10px 40px rgba(0,0,0,0.3);
            z-index: 10;
            border-top: 4px solid #444;
            cursor: pointer;
            transition: filter 0.3s ease;
        }
        .corrugated-roof:hover { filter: brightness(1.1); }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.25);
            filter: blur(20px);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
        }

        .roof-obj {
            position: absolute;
            cursor: pointer;
            transition: filter 0.3s ease, transform 0.3s ease;
            filter: drop-shadow(0 15px 12px rgba(0,0,0,0.4));
            z-index: 30;
        }
        .roof-obj:hover {
            transform: scale(1.04);
            filter: drop-shadow(0 20px 25px rgba(0,0,0,0.55)) brightness(1.08);
        }
    </style>
</head>
<body>

<div id="loader" class="loader">
    <div class="mb-2 text-7xl font-extralight text-red-600 tracking-[0.2em] font-serif transition-transform duration-700 hover:scale-105 select-none">דקה</div>
    <div class="mb-8 text-xs text-stone-500 font-light tracking-widest font-mono">מרחב מעבר אקוסטי ודינמי</div>
    <div id="progress" class="text-xs text-stone-600 mb-8 font-mono">משחזר את תדרי הזיכרון והבטון...</div>
    <button id="startBtn" disabled onclick="initApp()" class="border border-red-600/30 px-16 py-3 text-red-500 rounded-sm tracking-[0.3em] text-sm transition-all duration-500 hover:bg-red-600/10 hover:border-red-500 disabled:opacity-30 cursor-pointer">טוען...</button>
</div>

<div id="tooltip"></div>

.container {
  display: flex; /* מסדר את ה-divs זה לצד זה או זה מתחת לזה */
  flex-direction: row ;
  gap: 10px; /* ריווח בין האלמנטים */
}
<div class="scene" id="scene">

    <div class="rain-container" id="rain-layer"></div>

        <svg class="interactive absolute top-[15%] right-[15%] w-[120px] h-[170px]" id="firebox" data-id="firebox" data-info="עֶמְדַּת כִּבּוּי אֵשׁ אֲדֻמָּה וַחֲלֻדָּה, שָׂרִיד לְבִטָּחוֹן שֶׁנִּשְׁכַּח. עָלֶיהָ מֻדְבָּק מִסְמָךְ וּמַדְבֵּקָה יְשָׁנָה שֶׁל מַעֲשֵׂי שְׁרַבְרָבוּת.">

        <svg class="interactive absolute bottom-[12%] left-[20%] w-[380px] h-[170px]" id="mattress" data-id="mattress" data-info="מִזְרַן קְפִיצִים יָשָׁן, בָּלוּי וּמֻכְתָּם, הַמְּסַפֵּר סִפּוּר שֶׁל מַעֲבָר וּתְנוּעָה שֶׁנֶּעֶצְרָה בָּרְחוֹב הָעָמוּם.">

                <line x1="50" y1="50" x2="50" y2="180" stroke="#222" stroke-width="3" />

<script>
    const apiKey = "";
    let audioCtx;
    const audioCache = {};
    const tooltip = document.getElementById('tooltip');
    const scene = document.getElementById('scene');
    const rainLayer = document.getElementById('rain-layer');
    const visualizer = document.getElementById('visualizer');

    let currentScene = 1;
    let isRaining = false;
    let rainSoundNode;
    let windFilterNode;
    let roofBiquadFilter;
    let roofOsc;
    let roofResonance = false;
    let rainInterval;
    let dripInterval;

    const allObjects = () => document.querySelectorAll('.interactive, .roof-obj, .corrugated-roof');

    if (visualizer) {
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'vis-bar';
            visualizer.appendChild(bar);
        }
    }

    function pcmToWav(pcmData, sampleRate) {
        const buffer = new ArrayBuffer(44 + pcmData.length * 2);
        const view = new DataView(buffer);
        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        };
        writeString(0, 'RIFF');
        view.setUint32(4, 32 + pcmData.length * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmData.length * 2, true);
        let offset = 44;
        for (let i = 0; i < pcmData.length; i++, offset += 2) {
            view.setInt16(offset, pcmData[i], true);
        }
        return buffer;
    }

    async function fetchAudio(text, retries = 5) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        const payload = {
           contents: [{ parts: [{ text: `קרא בקול נשי, עמוק, איטי, דרמטי ופואטי, בהקפדה על הניקוד: ${text}` }] }],            generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
            },
            model: "gemini-2.5-flash-preview-tts"
        };

        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const result = await response.json();
                const inlinePart = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                const b64Data = inlinePart?.data;
                const mimeType = inlinePart?.mimeType || "audio/L16;rate=24000";
                if (b64Data) return { b64Data, mimeType };
                throw new Error("Empty audio data");
            } catch (err) {
                if (i === retries - 1) throw err;
                await new Promise(resolve => setTimeout(resolve, 1000 * Math.pow(2, i)));
            }
        }
    }

    async function preLoad() {
        const progress = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        let count = 0;
        const objs = allObjects();

        const tasks = Array.from(objs).map(async (obj) => {
            const id = obj.dataset.id;
            const info = obj.dataset.info;
            if (!id || !info || audioCache[id]) return;

            try {
                const result = await fetchAudio(info);
                const binaryString = atob(result.b64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                const rateMatch = result.mimeType.match(/rate=(\d+)/);
                const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
                const wavBuffer = pcmToWav(new Int16Array(bytes.buffer), sampleRate);
                audioCache[id] = URL.createObjectURL(new Blob([wavBuffer], { type: 'audio/wav' }));
                count++;
                if (progress) progress.innerText = `מכין תדרי זיכרון... (${count}/${objs.length})`;
            } catch (e) {
                setupWebSpeechFallback(id, info);
            }
        });

        if (startBtn) {
            startBtn.disabled = false;
            startBtn.innerText = "היכנס למרחב";
            startBtn.classList.remove('border-red-600/30', 'text-red-500');
            startBtn.classList.add('border-red-600', 'text-white', 'bg-red-600');
        }

        Promise.all(tasks).then(() => {
            if (progress) progress.innerText = "המרחב מוכן.";
        }).catch(() => {
            if (progress) progress.innerText = "המרחב מוכן.";
        });
    }

    function setupWebSpeechFallback(id, info) {
        if (!audioCache[id]) {
            audioCache[id] = () => {
                const cleanText = info.replace(/[\u0591-\u05C7]/g, "");
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = "he-IL";
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            };
        }
    }

    function initApp() {
        const loader = document.getElementById('loader');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1200);
        }
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playAmbientWind();
        switchScene(1);
        bindObjectEvents();
    }

    function playAmbientWind() {
        if (!audioCtx) return;
        const bufferSize = 4 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;

        const whiteNoise = audioCtx.createBufferSource();
        whiteNoise.buffer = noiseBuffer;
        whiteNoise.loop = true;

        windFilterNode = audioCtx.createBiquadFilter();
        windFilterNode.type = 'bandpass';
        windFilterNode.frequency.value = 130;
        windFilterNode.Q.value = 3.5;

        const windGain = audioCtx.createGain();
        windGain.gain.value = 0.03;

        whiteNoise.connect(windFilterNode);
        windFilterNode.connect(windGain);
        windGain.connect(audioCtx.destination);
        whiteNoise.start();

        setInterval(() => {
            if (audioCtx && windFilterNode) {
                const targetFreq = 100 + Math.random() * 90;
                windFilterNode.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 2.5);
            }
        }, 3500);
    }

    function initRoofAudio() {
        if (!audioCtx || roofBiquadFilter) return;
        roofBiquadFilter = audioCtx.createBiquadFilter();
        roofBiquadFilter.type = 'lowpass';
        roofBiquadFilter.frequency.setValueAtTime(140, audioCtx.currentTime);

        roofOsc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        roofOsc.type = 'sine';
        roofOsc.frequency.setValueAtTime(65, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.04, audioCtx.currentTime);

        roofOsc.connect(roofBiquadFilter);
        roofBiquadFilter.connect(gain);
        gain.connect(audioCtx.destination);
        roofOsc.start();
    }

    function switchScene(sceneNum) {
        currentScene = sceneNum;
        const s1 = document.getElementById('scene1-elements');
        const s2 = document.getElementById('scene2-elements');
        const s3 = document.getElementById('scene3-elements');
        const b1 = document.getElementById('btn-scene1');
        const b2 = document.getElementById('btn-scene2');
        const b3 = document.getElementById('btn-scene3');
        const concreteBg = document.getElementById('concrete-bg');
        const crack1 = document.getElementById('crack1');
        const crack2 = document.getElementById('crack2');
        const bottomFade = document.getElementById('bottom-fade');

        [s1, s2, s3].forEach(s => s && s.classList.add('hidden'));
        [b1, b2, b3].forEach(b => {
            if (b) { b.classList.remove('bg-red-600', 'text-white', 'bg-sky-600'); b.classList.add('text-stone-300'); }
        });

        if (sceneNum === 1) {
            s1 && s1.classList.remove('hidden');
            b1 && b1.classList.add('bg-red-600', 'text-white');
            b1 && b1.classList.remove('text-stone-300');
            document.documentElement.style.setProperty('--sky-bottom', '#2d2a27');
            scene.classList.remove('roof-scene');
            if (concreteBg) concreteBg.style.display = '';
            if (crack1) crack1.style.display = '';
            if (crack2) crack2.style.display = '';
            if (bottomFade) bottomFade.style.display = '';
        } else if (sceneNum === 2) {
            s2 && s2.classList.remove('hidden');
            b2 && b2.classList.add('bg-red-600', 'text-white');
            b2 && b2.classList.remove('text-stone-300');
            document.documentElement.style.setProperty('--sky-bottom', '#3e352f');
            scene.classList.remove('roof-scene');
            if (concreteBg) concreteBg.style.display = '';
            if (crack1) crack1.style.display = '';
            if (crack2) crack2.style.display = '';
            if (bottomFade) bottomFade.style.display = '';
        } else if (sceneNum === 3) {
            s3 && s3.classList.remove('hidden');
            b3 && b3.classList.add('bg-sky-600', 'text-white');
            b3 && b3.classList.remove('text-stone-300');
            document.documentElement.style.setProperty('--sky-top', '#8b9bb0');
            document.documentElement.style.setProperty('--sky-bottom', '#d2dae5');
            document.documentElement.style.setProperty('--dirt-ground', '#44403c');
            scene.classList.add('roof-scene');
            if (concreteBg) concreteBg.style.display = 'none';
            if (crack1) crack1.style.display = 'none';
            if (crack2) crack2.style.display = 'none';
            if (bottomFade) bottomFade.style.display = 'none';
            initRoofAudio();
        }
    }

    function toggleRain() {
        isRaining = !isRaining;
        const btn = document.getElementById('rainBtn');
        const laundry = document.getElementById('clothesline');
        const umbrella = document.getElementById('umbrella');
        
        if (isRaining) {
            if (btn) { btn.classList.add('active'); btn.innerText = 'גשם: דלוק'; }
            if (rainLayer) rainLayer.classList.add('active');
            if (laundry) laundry.classList.add('wet-laundry');
            if (umbrella) umbrella.classList.add('wet-laundry');
            createRaindrops();
            startRainSound();
            if (currentScene === 2) startPipeDripping();
        } else {
            if (btn) { btn.classList.remove('active'); btn.innerText = 'כבוי'; }
            if (rainLayer) { rainLayer.classList.remove('active'); rainLayer.innerHTML = ''; }
            if (laundry) laundry.classList.remove('wet-laundry');
            if (umbrella) umbrella.classList.remove('wet-laundry');
            clearInterval(rainInterval);
            clearInterval(dripInterval);
            stopRainSound();
        }
    }

    function createRaindrops() {
        rainInterval = setInterval(() => {
            if (rainLayer) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                rainLayer.appendChild(drop);
                setTimeout(() => drop.remove(), 1200);
            }
        }, 40);
    }

    function startRainSound() {
        if (!audioCtx) return;
        const bufferSize = 1 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
        rainSoundNode = audioCtx.createBufferSource();
        rainSoundNode.buffer = noiseBuffer;
        rainSoundNode.loop = true;
        const rainFilter = audioCtx.createBiquadFilter();
        rainFilter.type = 'highpass';
        rainFilter.frequency.value = 1000;
        const rainGain = audioCtx.createGain();
        rainGain.gain.value = 0.015;
        rainSoundNode.connect(rainFilter);
        rainFilter.connect(rainGain);
        rainGain.connect(audioCtx.destination);
        rainSoundNode.start();
    }

    function stopRainSound() {
        if (rainSoundNode) { try { rainSoundNode.stop(); } catch(e) {} }
    }

    function startPipeDripping() {
        dripInterval = setInterval(() => {
            const activeDripPoint = document.getElementById('pipe-drip-point');
            if (activeDripPoint && currentScene === 2) {
                const drip = document.createElement('div');
                drip.className = 'drip-effect';
                activeDripPoint.appendChild(drip);
                setTimeout(() => drip.remove(), 1500);
            }
            playClick(600 + Math.random() * 100, 0.02, 0.05);
        }, 1800);
    }

    function playClick(freq, vol = 0.08, duration = 0.4) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
        animateVisualizer();
    }

    function animateVisualizer() {
        const bars = document.querySelectorAll('.vis-bar');
        bars.forEach(bar => {
            const height = Math.random() * 22 + 2;
            bar.style.height = `${height}px`;
            setTimeout(() => { bar.style.height = '2px'; }, 300);
        });
    }

    function setTime(mode) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`time-${mode}`);
        if (activeBtn) activeBtn.classList.add('active');

        if (mode === 'sunset') {
            scene.classList.remove('night-mode');
            if (currentScene === 3) {
                document.documentElement.style.setProperty('--sky-top', '#8b9bb0');
                document.documentElement.style.setProperty('--sky-bottom', '#ffd2af');
            } else {
                document.documentElement.style.setProperty('--sky-top', '#1a1817');
                document.documentElement.style.setProperty('--sky-bottom', currentScene === 1 ? '#2d2a27' : '#3e352f');
            }
        } else if (mode === 'night') {
            scene.classList.add('night-mode');
            if (currentScene === 3) {
                document.documentElement.style.setProperty('--sky-top', '#05070c');
                document.documentElement.style.setProperty('--sky-bottom', '#0e111a');
            } else {
                document.documentElement.style.setProperty('--sky-top', '#030305');
                document.documentElement.style.setProperty('--sky-bottom', '#0b0a10');
            }
        } else if (mode === 'dawn') {
            scene.classList.remove('night-mode');
            if (currentScene === 3) {
                document.documentElement.style.setProperty('--sky-top', '#6a788c');
                document.documentElement.style.setProperty('--sky-bottom', '#b1bdcd');
            } else {
                document.documentElement.style.setProperty('--sky-top', '#718096');
                document.documentElement.style.setProperty('--sky-bottom', '#cbd5e0');
            }
        }
    }

    function updateFlashlight(e) {
        if (!scene.classList.contains('night-mode')) return;
        const rect = scene.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        document.documentElement.style.setProperty('--flashlight-x', `${x}px`);
        document.documentElement.style.setProperty('--flashlight-y', `${y}px`);
    }

    if (scene) {
        scene.addEventListener('mousemove', updateFlashlight);
        scene.addEventListener('touchmove', (e) => {
            if (e.touches[0]) updateFlashlight(e.touches[0]);
        });
    }

    function bindObjectEvents() {
        allObjects().forEach(obj => {
            if (obj._bound) return;
            obj._bound = true;
            obj.addEventListener('mouseenter', () => {
                if (tooltip) {
                    tooltip.innerText = obj.dataset.info || '';
                    tooltip.style.display = 'block';
                }
            });
            obj.addEventListener('mousemove', e => {
                if (tooltip) {
                    tooltip.style.left = (e.clientX + 20) + 'px';
                    tooltip.style.top = (e.clientY + 20) + 'px';
                }
            });
            obj.addEventListener('mouseleave', () => {
                if (tooltip) tooltip.style.display = 'none';
            });
            obj.addEventListener('click', () => {
                const id = obj.dataset.id;
                const freqs = { 'pipe': 65, 'firebox': 320, 'mattress': 95, 'trash-extra': 190, 'can': 450, 'cup': 550, 'plastic': 700, 'rack': 180, 'umbrella': 240, 'bucket': 380, 'clothesline': 110, 'concrete-cover': 75, 'plywood': 130, 'door': 210, 'cables': 80, 'grate': 520, 'windshield': 160, 'roof': 65 };
                playClick(freqs[id] || 200);
                const cachedSound = audioCache[id];
                if (cachedSound) {
                    if (typeof cachedSound === 'function') cachedSound();
                    else { const audio = new Audio(cachedSound); audio.play().catch(() => {}); }
                }
            });
        });
    }

    window.onload = preLoad;
</script>
</body>
</html>

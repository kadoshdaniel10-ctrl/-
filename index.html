<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דקה - מרחב מעבר אינטראקטיבי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dirt-ground: #2d2620;
            --wall-color: #57534e;
            --sky-top: #1a1817;
            --sky-bottom: #2d2a27;
            --flashlight-x: 50%;
            --flashlight-y: 50%;
        }
        body { 
            background-color: #0d0d0c; 
            overflow: hidden; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            cursor: crosshair;
            user-select: none;
        }
        .scene { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 60%, var(--dirt-ground) 100%); 
            perspective: 1200px;
            transition: background 2s ease, filter 1.5s ease;
        }
        
        /* אפקט קיר בטון מחוספס וסדוק */
        .concrete-wall-bg {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03) 0%, transparent 50%),
                url('https://www.transparenttextures.com/patterns/concrete-wall.png');
            opacity: 0.35;
            pointer-events: none;
            z-index: 1;
        }

        /* סדקים בקיר */
        .wall-crack {
            position: absolute;
            stroke: rgba(0, 0, 0, 0.4);
            stroke-width: 1.5;
            fill: none;
            pointer-events: none;
            z-index: 2;
        }

        /* מצב פנס אפל בלילה */
        .scene.night-mode::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle 180px at var(--flashlight-x) var(--flashlight-y), transparent 100%, rgba(5, 5, 8, 0.98) 100%);
            z-index: 90;
            mix-blend-mode: multiply;
        }
        .scene.night-mode::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle 220px at var(--flashlight-x) var(--flashlight-y), rgba(255, 220, 160, 0.18) 0%, transparent 100%);
            z-index: 89;
            mix-blend-mode: screen;
        }

        /* אפקט גשם נופל */
        .rain-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 40;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .rain-container.active {
            opacity: 1;
        }
        .drop {
            position: absolute;
            background: linear-gradient(transparent, rgba(156, 163, 175, 0.6));
            width: 1.5px;
            height: 50px;
            opacity: 0.7;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-100px); }
            100% { transform: translateY(110vh); }
        }

        /* אינטראקטיביות של חפצים */
        .interactive { cursor: pointer; transition: transform 0.3s ease, filter 0.3s ease; }
        .interactive:hover { filter: contrast(1.15) brightness(1.2); }

        #tooltip {
            position: fixed; background: rgba(18, 17, 16, 0.95); color: #fff;
            padding: 12px 18px; border-radius: 6px; pointer-events: none;
            display: none; z-index: 100; font-size: 13px; border-right: 4px solid #ef4444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            line-height: 1.6;
        }

        .loader {
            position: fixed; inset: 0; background: #0a0a0a; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 1000; color: white;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* לוח בקרה תחתון */
        .control-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(22, 21, 20, 0.92);
            backdrop-filter: blur(15px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100;
            width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
        }

        .time-btn.active {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }
        
        .toggle-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
        }

        /* אנימציות תנועה ברוח */
        @keyframes gentle-sway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }
        @keyframes shiver {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.005) translateY(0.5px); }
        }
        .sway-anim { animation: gentle-sway 6s ease-in-out infinite; transform-origin: top center; }
        .shiver-anim { animation: shiver 10s ease-in-out infinite; }

        /* קולטים לטפטוף */
        .drip-effect {
            position: absolute;
            background: rgba(156, 163, 175, 0.8);
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: dripFall 1.5s infinite linear;
        }
        @keyframes dripFall {
            0% { transform: translateY(0); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(400px); opacity: 0; }
        }

        /* ויזואלייזר קול */
        .visualizer-container {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 24px;
            width: 100%;
            margin-top: 10px;
        }
        .vis-bar {
            flex: 1;
            height: 2px;
            background: #ef4444;
            transition: height 0.15s ease;
        }
    </style>
</head>
<body>

<!-- מסך פתיחה משודרג - "דקה" -->
<div id="loader" class="loader">
    <div class="mb-2 text-7xl font-extralight text-red-600 tracking-[0.2em] font-serif transition-transform duration-700 hover:scale-105 select-none">דקה</div>
    <div class="mb-8 text-xs text-stone-500 font-light tracking-widest font-mono">מרחב מעבר אקוסטי ודינמי</div>
    <div id="progress" class="text-xs text-stone-600 mb-8 font-mono">משחזר את תדרי הזיכרון והבטון...</div>
    <button id="startBtn" disabled onclick="initApp()" class="border border-red-600/30 px-16 py-3 text-red-500 rounded-sm tracking-[0.3em] text-sm transition-all duration-500 hover:bg-red-600/10 hover:border-red-500 disabled:opacity-30 cursor-pointer">טוען...</button>
</div>

<div id="tooltip"></div>

<div class="scene" id="scene">
    <!-- טקסטורת קיר בטון -->
    <div class="concrete-wall-bg"></div>

    <!-- סדקים קבועים ברקע לשיפור הריאליזם -->
    <svg class="wall-crack" style="top: 8%; left: 4%; width: 220px; height: 160px;">
        <path d="M12,12 L35,45 L28,85 L65,115 L105,125 M28,85 L8,100 L15,135" />
    </svg>
    <svg class="wall-crack" style="top: 38%; right: 8%; width: 160px; height: 110px;">
        <path d="M12,95 L45,75 L60,35 L95,15 M45,75 L65,90" />
    </svg>

    <!-- מיכל הגשם הדינמי -->
    <div class="rain-container" id="rain-layer"></div>

    <!-- שלב 1: מזרן ופסולת (פעיל כברירת מחדל ומפורט במיוחד) -->
    <div id="scene1-elements" class="absolute inset-0">
        <div id="scene1-bg" class="absolute inset-0 pointer-events-none">
            <div class="absolute bottom-0 left-[8%] w-[120px] h-[85%] bg-stone-500 shadow-2xl border-l-4 border-stone-600"></div>
            <div class="absolute bottom-0 left-[34%] w-[120px] h-[85%] bg-stone-500 shadow-2xl border-l-4 border-stone-600"></div>
        </div>
        
        <!-- צינורות תשתית וחשמל מפותלים (Conduits) המגיעים מהתמונה המקורית -->
        <div id="conduit-layer" class="absolute inset-0 pointer-events-none z-10">
            <!-- צינור גמיש דק מעל המזרן -->
            <svg class="absolute" style="left: 15%; top: 0; width: 120px; height: 350px; fill: none; stroke: #555; stroke-width: 4.5;">
                <path d="M10,0 C20,100 5,200 45,310 L45,350" />
                <path d="M8,0 C18,100 3,200 43,310 L43,350" stroke="#777" stroke-width="1.5" />
            </svg>

            <!-- צינור תשתית דק ליד קופסת כיבוי האש -->
            <svg class="absolute" style="right: 22%; top: 0; width: 100px; height: 450px; fill: none; stroke: #444; stroke-width: 6;">
                <path d="M10,0 L10,120 Q10,150 40,160 L60,160 Q80,165 80,190 L80,450" />
                <path d="M8,0 L8,120 Q8,150 38,160 L58,160 Q78,165 78,190 L78,450" stroke="#888" stroke-width="2" />
            </svg>
        </div>

        <svg class="interactive absolute top-[15%] right-[15%] w-[120px] h-[170px]" id="firebox" data-id="firebox" data-info="עֶמְדַּת כִּבּוּי אֵשׁ אֲדֻמָּה וַחֲלֻדָּה, שָׂרִיד לְבִטָּחוֹן שֶׁנִּשְׁכַּח. עָלֶיהָ מֻדְבָּק מִסְמָךְ וּמַדְבֵּקָה יְשָׁנָה שֶׁל מַעֲשֵׂי שְׁרַבְרָבוּת.">
            <rect x="0" y="0" width="120" height="170" fill="#991b1b" stroke="#7f1d1d" stroke-width="5" rx="3"/>
            <rect x="12" y="15" width="96" height="140" fill="#7f1d1d" opacity="0.4"/>
            <rect x="25" y="100" width="70" height="25" fill="#facc15" stroke="#ca8a04" stroke-width="1" rx="1" />
            <text x="60" y="112" fill="#000" font-size="6.5" font-weight="bold" text-anchor="middle">האחים בן חמו</text>
            <text x="60" y="120" fill="#000" font-size="5" text-anchor="middle">אינסטלטורים</text>
            <!-- מנעול תלוי -->
            <rect x="98" y="70" width="10" height="12" fill="#a1a1aa" stroke="#71717a" />
            <path d="M100,70 C100,64 106,64 106,70" fill="none" stroke="#71717a" stroke-width="2" />
        </svg>

        <svg class="interactive absolute bottom-[12%] left-[20%] w-[380px] h-[170px]" id="mattress" data-id="mattress" data-info="מִזְרַן קְפִיצִים יָשָׁן, בָּלוּי וּמֻכְתָּם, הַמְּסַפֵּר סִפּוּר שֶׁל מַעֲבָר וּתְנוּעָה שֶׁנֶּעֶצְרָה בָּרְחוֹב הָעָמוּם.">
            <rect x="0" y="0" width="380" height="170" rx="10" fill="#5b2114" stroke="#2d0f0a" stroke-width="3" />
            <rect x="6" y="6" width="368" height="158" rx="6" fill="#78350f" opacity="0.8" />
            <path d="M40 0 L40 170 M100 0 L100 170 M160 0 L160 170 M220 0 L220 170 M280 0 L280 170 M340 0 L340 170" stroke="#451a03" stroke-width="2" opacity="0.6"/>
            <ellipse cx="140" cy="90" rx="18" ry="12" fill="#451a03" opacity="0.7"/>
            <path d="M125 90 Q140 75 155 90" stroke="#333" stroke-width="2" />
        </svg>

        <!-- קרטון קרוע גדול -->
        <svg class="interactive absolute bottom-[8%] left-[55%] w-[90px] h-[45px]" id="trash-extra" data-id="trash-extra" data-info="פְּסֹלֶת נְיָר וְקַרְטוֹן זְרוּקִים עַל הָאֲדָמָה הַלַּחָה, שׁוֹקְעִים בְּאִטִּיּוּת בָּאֲבָק.">
            <path d="M5,40 L85,35 L75,5 L15,10 Q5,20 5,40 Z" fill="#a16207" opacity="0.9"/>
            <rect x="15" y="20" width="50" height="15" fill="#854d0e" opacity="0.5"/>
        </svg>
        
        <!-- פחית מעוכה -->
        <svg class="interactive absolute bottom-[6%] left-[48%] w-[45px] h-[25px]" id="can-red" data-id="can" data-info="פַּחִית שְׁתִיָּה מְעוּכָה, שְׁאֵרִית לִזְמַן אַחֵר שֶׁחָלַף בַּמָּקוֹם.">
            <path d="M0 12 L35 4 L45 15 L10 23 Z" fill="#b91c1c" stroke="#7f1d1d" stroke-width="2" />
            <ellipse cx="10" cy="18" rx="8" ry="4" fill="#7f1d1d" />
        </svg>

        <!-- כוס פלסטיק מעוכה -->
        <svg class="interactive absolute bottom-[5%] left-[25%] w-[25px] h-[20px]" id="cup" data-id="cup" data-info="כּוֹס פְּלַסְטִיק שְׁקוּפָה וּמְעוּכָה, מְכוּסָה בְּאֵפֶר וּבְמַיִם עֲמוּמִים.">
            <ellipse cx="12" cy="10" rx="10" ry="4" fill="rgba(240,240,250,0.3)" stroke="rgba(200,200,200,0.6)" stroke-width="1.5" />
            <path d="M2,10 L5,18 L20,18 L22,10 Z" fill="rgba(240,240,250,0.15)" stroke="rgba(200,200,200,0.5)" stroke-width="1.2" />
        </svg>

        <!-- שקית פלסטיק כחולה קרועה מימין -->
        <svg class="interactive absolute bottom-[4%] right-[25%] w-[35px] h-[25px]" id="plastic" data-id="plastic" data-info="שְׁרִידֵי שַׂקִּית פְּלַסְטִיק כְּחֻלָּה הַקְּרוּעָה וּמֻדְבֶּקֶת לַבֶּטוֹן הַלַּח.">
            <path d="M2,18 Q15,2 32,12 Q20,25 15,15 Q5,24 2,18 Z" fill="#2563eb" opacity="0.6" stroke="#1d4ed8" stroke-width="1" />
        </svg>
    </div>

    <!-- שלב 2: מרחב המעבר והכביסה (IMG_8445) - מוסתר כברירת מחדל, צבעוני ומלא פרטים -->
    <div id="scene2-elements" class="hidden absolute inset-0">
        <!-- עמודי בטון מסיביים ותקרת בטון חשופה -->
        <div id="scene2-bg" class="absolute inset-0 pointer-events-none transition-transform duration-200">
            <!-- עמוד שמאלי -->
            <div class="absolute bottom-0 left-[10%] w-[130px] h-[85%] bg-stone-500 shadow-2xl border-r-4 border-stone-600"></div>
            <!-- עמוד מרכזי -->
            <div class="absolute bottom-0 left-[42%] w-[140px] h-[85%] bg-stone-500 shadow-2xl border-l-4 border-stone-600"></div>
            <!-- עמוד ימני מרוחק -->
            <div class="absolute bottom-0 right-[15%] w-[110px] h-[85%] bg-stone-400 shadow-xl"></div>
            <!-- תקרת בטון עליונה -->
            <div class="absolute top-0 left-0 w-full h-[120px] bg-stone-600 shadow-md"></div>
        </div>

        <!-- רצועת מתיחה כתומה-ירוקה ריאליסטית וקשורה סביב העמודים כמו בתצלום החדש -->
        <svg class="absolute top-[210px] left-[15%] w-[32%] h-[60px]" style="z-index: 12; pointer-events: none;">
            <path d="M0,32 Q120,48 240,18" fill="none" stroke="#f97316" stroke-width="4.5" />
            <path d="M0,32 Q120,48 240,18" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-dasharray="10 6" />
        </svg>

        <!-- מתקן כביסה כחול חי ואינטראקטיבי משמאל -->
        <div id="laundry-rack-layer" class="absolute bottom-0 left-[5%] w-[200px] h-[350px] transition-transform duration-200 pointer-events-none">
            <svg class="interactive pointer-events-auto" id="rack" data-id="rack" data-info="מַתְלֵה כְּבִיסָה כָּחֹל בּוֹלֵט מִפְּלַסְטִיק. מִבְנֶה מִינִימָלִיסְטִי הָעוֹמֵד כְּעֵדוּת אַרְעִית לְחַיֵּי הַיּוֹם-יוֹם בַּבִּנְיָן." width="180" height="340" viewBox="0 0 180 340">
                <g stroke="#3b82f6" stroke-width="6" fill="none" stroke-linecap="round">
                    <line x1="30" y1="340" x2="30" y2="40" />
                    <line x1="150" y1="340" x2="150" y2="40" />
                    <line x1="30" y1="100" x2="150" y2="100" stroke-width="4" />
                    <line x1="30" y1="180" x2="150" y2="180" stroke-width="4" />
                    <line x1="30" y1="260" x2="150" y2="260" stroke-width="4" />
                    <path d="M30,40 Q90,10 150,40" stroke-width="5" />
                </g>
                <rect x="18" y="325" width="24" height="15" fill="#1d4ed8" rx="2" />
                <rect x="138" y="325" width="24" height="15" fill="#1d4ed8" rx="2" />
            </svg>
        </div>

        <!-- חבל כביסה משודרג עם בגדים צבעוניים (חולצה צהובה, גרביים אדומים, מכנסיים) ואטבים צבעוניים -->
        <div id="clothesline-layer" class="absolute top-[250px] left-[35%] w-[45vw] h-[200px] transition-transform duration-200 pointer-events-none">
            <svg class="interactive pointer-events-auto sway-anim" id="clothesline" data-id="clothesline" data-info="בְּגָדִים צִבְעוֹנִיִּים וְכֵהִים תְּלוּיִים לְיִבּוּשׁ עַל חֶבֶל, סוֹפֵגִים אֶת הַלַּחוּת וְנִיחוֹחַ הַבֶּטוֹן הַיָּבֵשׁ. אָטְבֵי הַכְּבִיסָה זוֹהֲרִים בִּוְרֹד וְטוּרְקִיז." width="450" height="180" viewBox="0 0 450 180">
                <!-- חבל -->
                <path d="M0,15 Q225,50 450,15" fill="none" stroke="#888" stroke-width="2" />
                
                <!-- מכנסיים כהים -->
                <path d="M100,25 L160,30 L150,140 L135,140 L130,70 L120,70 L115,140 L100,140 Z" fill="#2d2d30" />
                
                <!-- חולצה צהובה עזה (צבעוניות חדשה) -->
                <path d="M210,36 L265,32 L280,58 L265,62 L260,45 L260,110 L212,110 Z" fill="#eab308" stroke="#ca8a04" stroke-width="1" />
                
                <!-- גרב אדומה קטנה (פרט צבעוני) -->
                <path d="M330,30 L345,30 L343,75 L358,85 L350,92 L332,75 Z" fill="#ef4444" />

                <!-- אטבי כביסה צבעוניים (ורוד, כחול, טורקיז) -->
                <rect x="110" y="16" width="5" height="14" fill="#ec4899" rx="1"/>
                <rect x="145" y="18" width="5" height="14" fill="#06b6d4" rx="1"/>
                <rect x="225" y="24" width="5" height="14" fill="#a855f7" rx="1"/>
                <rect x="250" y="22" width="5" height="14" fill="#10b981" rx="1"/>
                <rect x="335" y="24" width="5" height="14" fill="#f97316" rx="1"/>
            </svg>
        </div>

        <!-- מטרייה תלויה הפוך במרכז -->
        <div id="umbrella-layer" class="absolute top-[230px] left-[26%] w-[120px] h-[250px] transition-transform duration-200 pointer-events-none">
            <svg class="interactive pointer-events-auto sway-anim" id="umbrella" data-id="umbrella" data-info="Mִטְרִיָּה מְקֻפֶּלֶת תְּלוּיָה הָפוּךְ. מַמְתִּינָה לַגֶּשֶׁם שֶׁיִּשְׁטֹף אֶת הָאָבָק הָאוּרְבָּנִי הַנֶּעֱרָם." width="100" height="200" viewBox="0 0 100 200">
                <!-- חבל תלייה -->
                <line x1="50" y1="0" x2="50" y2="50" stroke="#444" stroke-width="2" />
                <!-- ידית מעוקלת -->
                <path d="M50,50 Q50,40 40,40 Q30,40 30,55" fill="none" stroke="#111" stroke-width="4.5" />
                <!-- גוף המטרייה -->
                <line x1="50" y1="50" x2="50" y2="180" stroke="#222" stroke-width="3" />
                <path d="M50,65 L25,160 L50,150 L75,160 Z" fill="#6b7280" stroke="#4b5563" stroke-width="1" />
                <path d="M50,65 L37,160 L50,150 L63,160 Z" fill="#4b5563" />
            </svg>
        </div>

        <!-- דלי לבן תלוי מימין עם פסים צבעוניים -->

        <!-- לוח עץ מעוצב ואינטראקטיבי מימין (PLYWOOD) המוטה לעבר הקיר בהשראת התצלום -->
        <div id="plywood-layer" class="absolute bottom-0 right-[4%] w-[160px] h-[330px] transition-transform duration-200 pointer-events-none" style="z-index: 15;">

                <!-- טקסטורת קווי עץ עדינים -->
                <div class="absolute inset-0 opacity-15" style="background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');"></div>
                <!-- כיתוב סטנסיל כמו בצילום -->
                <div class="absolute top-12 left-5 text-[9px] text-[#2c1d11] font-mono tracking-[0.3em] transform -rotate-90 select-none opacity-50 font-bold leading-none">
                    PLYWOOD PLYWOOD<br>PLYWOOD PLYWOOD
                </div>
            </div>
        </div>

        <!-- מכסה בטון עגול ברקע -->
        <div id="cover-layer" class="absolute bottom-[10%] left-[28%] w-[140px] h-[50px] transition-transform duration-200 pointer-events-none">
            <svg class="interactive pointer-events-auto" id="concrete-cover" data-id="concrete-cover" data-info="Mִכְסֵה בֶּטוֹן עָגֹל עַל הַקַּרְקַע. מִתַּחְתָּיו מְהַדְהֵד קוֹלָהּ הַשָּׁקֵט וְהֶעָמוּם שֶׁל הַתַּשְׁתִּית הָעִירוֹנִית." width="140" height="50" viewBox="0 0 140 50">
                <ellipse cx="70" cy="25" rx="65" ry="20" fill="#78716c" stroke="#57534e" stroke-width="3" />
                <ellipse cx="70" cy="25" rx="55" ry="14" fill="none" stroke="#57534e" stroke-width="1.5" stroke-dasharray="4 4" />
            </svg>
        </div>

        <!-- קטעי דשא ירוקים המבצבצים בין סדקי הבטון בתחתית כמו בצילום -->
        <div class="absolute bottom-[40px] left-[32%] text-green-600/80 font-bold text-lg select-none pointer-events-none" style="z-index: 10;">🌿</div>
        <div class="absolute bottom-[35px] left-[55%] text-green-700/60 font-bold text-sm select-none pointer-events-none" style="z-index: 10;">🪻</div>
    </div>

    <!-- נקודת טפטוף הצינור - ממוקם בבטחה ברמה הגלובלית -->
    <div id="pipe-drip-point" style="position: absolute; left: 19.5%; top: 60%; pointer-events: none; z-index: 25;"></div>

<!-- פאנל השליטה האינטראקטיבי -->
<div class="control-panel">
    <h1 class="text-lg font-semibold text-stone-100 tracking-tight">מרחב נטוש: מיצב דינמי</h1>
    
    <!-- בורר שלבים -->
    <div class="flex gap-2 my-3 bg-stone-900/80 p-1 rounded-lg border border-white/5">
        <button id="btn-scene1" onclick="switchScene(1)" class="flex-1 py-1 rounded text-center text-xs font-semibold text-stone-300 transition active bg-red-600 text-white">מזרן נטוש וגלמוד</button>
        <button id="btn-scene2" onclick="switchScene(2)" class="flex-1 py-1 rounded text-center text-xs font-semibold text-stone-300 transition">חלל המעבר והכביסה</button>
    </div>

    <!-- בורר זמנים -->
    <div class="flex gap-2 mb-3 bg-black/45 p-1 rounded-lg border border-white/5">
        <button id="time-sunset" onclick="setTime('sunset')" class="time-btn flex-1 py-1.5 rounded text-center active font-medium text-xs transition">שקיעה</button>
        <button id="time-night" onclick="setTime('night')" class="time-btn flex-1 py-1.5 rounded text-center font-medium text-xs transition">לילה</button>
        <button id="time-dawn" onclick="setTime('dawn')" class="time-btn flex-1 py-1.5 rounded text-center font-medium text-xs transition">שחר</button>
    </div>

    <!-- כפתור גשם אינטראקטיבי -->
    <div class="flex items-center justify-between bg-black/30 p-2.5 rounded-lg border border-white/5">
        <span class="text-xs text-stone-300">אווירת גשם וטפטופים</span>
        <button id="rainBtn" onclick="toggleRain()" class="toggle-btn px-4 py-1.5 rounded text-xs font-semibold bg-stone-700 hover:bg-stone-600 transition">כבוי</button>
    </div>

    <!-- ויזואלייזר תדרי שמע מגיב -->
    <div class="visualizer-container" id="visualizer">
        <!-- עמודי הויזואלייזר ייווצרו דינמית ב-JS -->
    </div>
</div>

<script>
    const apiKey = "";
    let audioCtx;
    const audioCache = {};
    const tooltip = document.getElementById('tooltip');
    let objects = document.querySelectorAll('.interactive');
    const scene = document.getElementById('scene');
    const rainLayer = document.getElementById('rain-layer');
    const visualizer = document.getElementById('visualizer');

    let currentScene = 1; // Default starting scene is now step 1
    let isRaining = false;
    let rainSoundNode;
    let windFilterNode;
    let rainInterval;
    let dripInterval;

    // פונקציית עזר לשליפת נקודת הטפטוף בבטחה
    const getDripPoint = () => document.getElementById('pipe-drip-point');

    // בניית עמודי ויזואלייזר
    if (visualizer) {
        for (let i = 0; i < 20; i++) {
            const bar = document.createElement('div');
            bar.className = 'vis-bar';
            visualizer.appendChild(bar);
        }
    }

    // המרת PCM ל-WAV עבור ניגון בדפדפנים
    function pcmToWav(pcmData, sampleRate) {
        const buffer = new ArrayBuffer(44 + pcmData.length * 2);
        const view = new DataView(buffer);
        const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        };
        writeString(0, 'RIFF');
        view.setUint32(4, 32 + pcmData.length * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmData.length * 2, true);
        let offset = 44;
        for (let i = 0; i < pcmData.length; i++, offset += 2) {
            view.setInt16(offset, pcmData[i], true);
        }
        return buffer;
    }

    // פנייה לשירות ה-TTS עם מנגנון הגנה וניסיונות חוזרים (Exponential Backoff)
    async function fetchAudio(text, retries = 5) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: `קרא בקול עמוק, איטי, דרמטי ופואטי, בהקפדה על הניקוד: ${text}` }] }],
            generationConfig: {
                responseModalities: ["AUDIO"],
                speechConfig: { 
                    voiceConfig: { 
                        prebuiltVoiceConfig: { 
                            voiceName: "Charon" 
                        } 
                    } 
                }
            },
            model: "gemini-2.5-flash-preview-tts"
        };

        for (let i = 0; i < retries; i++) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const result = await response.json();
                
                const inlinePart = result.candidates?.[0]?.content?.parts?.[0]?.inlineData;
                const b64Data = inlinePart?.data;
                const mimeType = inlinePart?.mimeType || "audio/L16;rate=24000";
                
                if (b64Data) {
                    return { b64Data, mimeType };
                } else {
                    throw new Error("Empty audio data returned from API");
                }
            } catch (err) {
                if (i === retries - 1) throw err;
                await new Promise(resolve => setTimeout(resolve, 1000 * Math.pow(2, i)));
            }
        }
    }

    // טעינה מקבילה מראש לשיפור חווית המשתמש
    async function preLoad() {
        const progress = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        let count = 0;

        const tasks = Array.from(objects).map(async (obj) => {
            const id = obj.dataset.id;
            const info = obj.dataset.info;
            if (!id || !info) return;

            try {
                const result = await fetchAudio(info);
                const binaryString = atob(result.b64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                const rateMatch = result.mimeType.match(/rate=(\d+)/);
                const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;

                const wavBuffer = pcmToWav(new Int16Array(bytes.buffer), sampleRate);
                audioCache[id] = URL.createObjectURL(new Blob([wavBuffer], { type: 'audio/wav' }));
                count++;
                if (progress) progress.innerText = `מכין תדרי זיכרון מנוקדים... (${count}/${objects.length})`;
            } catch (e) {
                setupWebSpeechFallback(id, info);
            }
        });

        if (startBtn) {
            startBtn.disabled = false;
            startBtn.innerText = "היכנס למרחב";
            startBtn.classList.remove('border-red-600/30', 'text-red-500');
            startBtn.classList.add('border-red-600', 'text-white', 'bg-red-600');
        }
        
        Promise.all(tasks).then(() => {
            if (progress) progress.innerText = "המרחב מסונכרן ומוכן לחלוטין.";
        }).catch(() => {
            if (progress) progress.innerText = "המרחב מוכן עם תצורות שמע חלקיות.";
        });
    }

    // גיבוי מקומי לקריינות באמצעות Web Speech API במידה ומפתח ה-API חסר או לא תקין
    function setupWebSpeechFallback(id, info) {
        if (!audioCache[id]) {
            audioCache[id] = () => {
                const cleanText = info.replace(/[\u0591-\u05C7]/g, ""); // הסרת ניקוד לשיפור ההקראה המקומית
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = "he-IL";
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            };
        }
    }

    // אתחול מערכת השמע והמיצב
    function initApp() {
        const loader = document.getElementById('loader');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 1200);
        }
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // יצירת סאונד רוח בבסיס המרחב
        playAmbientWind();
        
        // הגדרת שלב ראשוני - שלב 1 כברירת מחדל
        switchScene(1);
    }

    // סינתיזה מלאה של רעש רוח משתנה
    function playAmbientWind() {
        if (!audioCtx) return;

        const bufferSize = 4 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        const whiteNoise = audioCtx.createBufferSource();
        whiteNoise.buffer = noiseBuffer;
        whiteNoise.loop = true;

        windFilterNode = audioCtx.createBiquadFilter();
        windFilterNode.type = 'bandpass';
        windFilterNode.frequency.value = 130;
        windFilterNode.Q.value = 3.5;

        const windGain = audioCtx.createGain();
        windGain.gain.value = 0.03;

        whiteNoise.connect(windFilterNode);
        windFilterNode.connect(windGain);
        windGain.connect(audioCtx.destination);
        whiteNoise.start();

        // שינוי תדרים עצמאי של הרוח
        setInterval(() => {
            if (audioCtx && windFilterNode) {
                const targetFreq = 100 + Math.random() * 90;
                windFilterNode.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 2.5);
            }
        }, 3500);
    }

    // מעבר בין שלב 1 לשלב 2
    function switchScene(sceneNum) {
        currentScene = sceneNum;
        const s1 = document.getElementById('scene1-elements');
        const s2 = document.getElementById('scene2-elements');
        const b1 = document.getElementById('btn-scene1');
        const b2 = document.getElementById('btn-scene2');

        if (sceneNum === 1) {
            if (s1) s1.classList.remove('hidden');
            if (s2) s2.classList.add('hidden');
            if (b1) {
                b1.classList.add('bg-red-600', 'text-white');
                b1.classList.remove('text-stone-300');
            }
            if (b2) {
                b2.classList.remove('bg-red-600', 'text-white');
                b2.classList.add('text-stone-300');
            }
            document.documentElement.style.setProperty('--sky-bottom', '#2d2a27');
        } else {
            if (s1) s1.classList.add('hidden');
            if (s2) s2.classList.remove('hidden');
            if (b2) {
                b2.classList.add('bg-red-600', 'text-white');
                b2.classList.remove('text-stone-300');
            }
            if (b1) {
                b1.classList.remove('bg-red-600', 'text-white');
                b1.classList.add('text-stone-300');
            }
            document.documentElement.style.setProperty('--sky-bottom', '#3e352f');
        }
    }

    // שליטה בגשם וטפטופים (סאונד + ויזואל)
    function toggleRain() {
        isRaining = !isRaining;
        const btn = document.getElementById('rainBtn');
        
        if (isRaining) {
            if (btn) {
                btn.classList.add('active');
                btn.innerText = 'פעיל';
            }
            if (rainLayer) rainLayer.classList.add('active');
            
            // יצירת טיפות גשם נופלות על המסך
            createRaindrops();
            // הפעלת סאונד גשם סינתטי
            startRainSound();
            // הפעלת טפטוף מים
            startPipeDripping();
        } else {
            if (btn) {
                btn.classList.remove('active');
                btn.innerText = 'כבוי';
            }
            if (rainLayer) {
                rainLayer.classList.remove('active');
                rainLayer.innerHTML = '';
            }
            clearInterval(rainInterval);
            clearInterval(dripInterval);
            stopRainSound();
        }
    }

    function createRaindrops() {
        rainInterval = setInterval(() => {
            if (rainLayer) {
                const drop = document.createElement('div');
                drop.className = 'drop';
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                rainLayer.appendChild(drop);
                setTimeout(() => drop.remove(), 1200);
            }
        }, 40);
    }

    // יצירת סאונד גשם ריאליסטי על ידי תדירות גבוהה של פעימות רעש לבן
    function startRainSound() {
        if (!audioCtx) return;

        const bufferSize = 1 * audioCtx.sampleRate;
        const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const output = noiseBuffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            output[i] = Math.random() * 2 - 1;
        }

        rainSoundNode = audioCtx.createBufferSource();
        rainSoundNode.buffer = noiseBuffer;
        rainSoundNode.loop = true;

        const rainFilter = audioCtx.createBiquadFilter();
        rainFilter.type = 'highpass';
        rainFilter.frequency.value = 1000;

        const rainGain = audioCtx.createGain();
        rainGain.gain.value = 0.015;

        rainSoundNode.connect(rainFilter);
        rainFilter.connect(rainGain);
        rainGain.connect(audioCtx.destination);
        rainSoundNode.start();
    }

    function stopRainSound() {
        if (rainSoundNode) {
            try { rainSoundNode.stop(); } catch(e) {}
        }
    }

    // סימולציית טפטוף מים מצינור הניקוז (מיושם בבטחה עם הגנת Null)
    function startPipeDripping() {
        dripInterval = setInterval(() => {
            const activeDripPoint = getDripPoint();
            if (activeDripPoint && currentScene === 2) {
                const drip = document.createElement('div');
                drip.className = 'drip-effect';
                activeDripPoint.appendChild(drip);
                setTimeout(() => drip.remove(), 1500);
            }
            // השמעת קליק קצר של טיפת מים מנומכת
            playClick(600 + Math.random() * 100, 0.02, 0.05);
        }, 1800);
    }

    function playClick(freq, vol = 0.08, duration = 0.4) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);

        animateVisualizer();
    }

    // הפעלת האנימציה של הויזואלייזר בכל צליל
    function animateVisualizer() {
        const bars = document.querySelectorAll('.vis-bar');
        if (bars.length > 0) {
            bars.forEach(bar => {
                const height = Math.random() * 22 + 2;
                bar.style.height = `${height}px`;
                setTimeout(() => {
                    bar.style.height = '2px';
                }, 300);
            });
        }
    }

    // שינוי זמני יום (שקיעה, לילה, שחר)
    function setTime(mode) {
        document.querySelectorAll('.time-selector button, .time-btn').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`time-${mode}`);
        if (activeBtn) activeBtn.classList.add('active');

        if (mode === 'sunset') {
            if (scene) scene.classList.remove('night-mode');
            document.documentElement.style.setProperty('--sky-top', '#1a1817');
            document.documentElement.style.setProperty('--sky-bottom', currentScene === 1 ? '#2d2a27' : '#3e352f');
            document.documentElement.style.setProperty('--dirt-ground', '#3d2a1c');
            if (windFilterNode) windFilterNode.frequency.setTargetAtTime(140, audioCtx.currentTime, 1.2);
        } else if (mode === 'night') {
            if (scene) scene.classList.add('night-mode');
            document.documentElement.style.setProperty('--sky-top', '#030305');
            document.documentElement.style.setProperty('--sky-bottom', '#0b0a10');
            document.documentElement.style.setProperty('--dirt-ground', '#14110f');
            if (windFilterNode) windFilterNode.frequency.setTargetAtTime(85, audioCtx.currentTime, 1.2);
        } else if (mode === 'dawn') {
            if (scene) scene.classList.remove('night-mode');
            document.documentElement.style.setProperty('--sky-top', '#718096');
            document.documentElement.style.setProperty('--sky-bottom', '#cbd5e0');
            document.documentElement.style.setProperty('--dirt-ground', '#2d2a27');
            if (windFilterNode) windFilterNode.frequency.setTargetAtTime(250, audioCtx.currentTime, 1.2);
        }
    }

    // אלומת פנס מגיבה במצב לילה
    function updateFlashlight(e) {
        if (!scene || !scene.classList.contains('night-mode')) return;
        const rect = scene.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        document.documentElement.style.setProperty('--flashlight-x', `${x}px`);
        document.documentElement.style.setProperty('--flashlight-y', `${y}px`);
    }

    if (scene) {
        scene.addEventListener('mousemove', updateFlashlight);
        scene.addEventListener('touchmove', (e) => {
            if (e.touches[0]) updateFlashlight(e.touches[0]);
        });

        // אפקט פרלקס עמוק לתנועת עכבר (כולל מניעת קריסות באמצעות בדיקת קיום האלמנטים)
        scene.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 55;
            const y = (window.innerHeight / 2 - e.clientY) / 55;

            const bg1 = document.getElementById('scene1-bg');
            const bg2 = document.getElementById('scene2-bg');
            const rack = document.getElementById('laundry-rack-layer');
            const line = document.getElementById('clothesline-layer');
            const umb = document.getElementById('umbrella-layer');
            const bkt = document.getElementById('bucket-layer');
            const ply = document.getElementById('plywood-layer');

            if (bg1) bg1.style.transform = `translate3d(${x * 0.4}px, ${y * 0.4}px, 0)`;
            if (bg2) bg2.style.transform = `translate3d(${x * 0.4}px, ${y * 0.4}px, 0)`;
            if (rack) rack.style.transform = `translate3d(${x * 1.3}px, ${y * 1.3}px, 0)`;
            if (line) line.style.transform = `translate3d(${x * 0.9}px, ${y * 0.9}px, 0)`;
            if (umb) umb.style.transform = `translate3d(${x * 1.1}px, ${y * 1.1}px, 0)`;
            if (bkt) bkt.style.transform = `translate3d(${x * 0.8}px, ${y * 0.8}px, 0)`;
            if (ply) ply.style.transform = `translate3d(${x * 1.4}px, ${y * 1.2}px, 0)`;
        });
    }

    // חיבור המאזינים ללחיצה על חפצים
    objects.forEach(obj => {
        obj.addEventListener('mouseenter', e => {
            if (tooltip) {
                tooltip.innerText = obj.dataset.info;
                tooltip.style.display = 'block';
            }
        });
        obj.addEventListener('mousemove', e => {
            if (tooltip) {
                tooltip.style.left = (e.clientX + 20) + 'px';
                tooltip.style.top = (e.clientY + 20) + 'px';
            }
        });
        obj.addEventListener('mouseleave', () => {
            if (tooltip) tooltip.style.display = 'none';
        });
        
        obj.addEventListener('click', () => {
            obj.style.transform = 'scale(0.96) rotate(1deg)';
            setTimeout(() => obj.style.transform = '', 200);

            const id = obj.dataset.id;
            
            // צלילים פיזיקליים מותאמים
            const freqs = { 
                'pipe': 65, 'firebox': 320, 'mattress': 95, 'trash-extra': 190, 
                'can': 450, 'cup': 550, 'plastic': 700, 'rack': 180, 
                'umbrella': 240, 'bucket': 380, 'clothesline': 110, 
                'concrete-cover': 75, 'plywood': 130 
            };
            playClick(freqs[id] || 200);

            // השמעת הקריינות הפואטית השמורה ב-Cache או הפעלת הגיבוי המקומי
            const cachedSound = audioCache[id];
            if (cachedSound) {
                if (typeof cachedSound === 'function') {
                    cachedSound(); // הפעלת הגיבוי המקומי
                } else {
                    const audio = new Audio(cachedSound);
                    audio.volume = 1.0;
                    audio.play().catch(e => {
                        // ניסיון קריאה חוזר שקט במקרה של שגיאת דפדפן
                    });
                }
            }
        });
    });

    window.onload = preLoad;
</script>

</body>
</html>
